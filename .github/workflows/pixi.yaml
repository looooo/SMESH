on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - if: matrix.os == 'ubuntu-latest'
      name: "Fix dependencies"
      run: |
          sudo apt-get install mesa-common-dev

    - uses: actions/checkout@v4
      name: Checkout
      with:
        submodules: true

    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        environments: build-debug
        cache: true

    - name: Cache build
      uses: actions/cache@v4
      id: build-cache
      with:
        path: |
          build
          test/build
        key: build-${{ runner.os }}-${{ hashFiles('pixi.lock', 'pixi.toml', 'prepare.py', 'patch/**', 'CMakeLists.txt', 'cmake/**', 'test/CMakeLists.txt', 'test/src/**', 'extra/**', 'external/SMESH/**', 'external/Kernel/**', 'external/Geom/**', 'external/Netgen/**', 'external/NETGENPlugin/**') }}
        restore-keys: |
          build-${{ runner.os }}-

    - run: pixi run -e build-debug build
    - run: pixi run -e build-debug test
    - if: failure() && matrix.os == 'windows-latest'
      name: Capture crash dump (Windows)
      shell: bash
      run: |
        curl -sSL -o procdump.zip https://download.sysinternals.com/files/Procdump.zip
        unzip -o procdump.zip procdump64.exe
        mkdir -p dumps
        pixi exec -e build-debug -- ./procdump64.exe -e -accepteula -o dumps test/tests/test_MEFISTO2.exe || true
    - if: failure() && matrix.os == 'windows-latest'
      name: Analyze crash dump (print stack to log)
      shell: bash
      run: |
        for dmp in dumps/*.dmp; do
          [ -f "$dmp" ] || continue
          echo "=== Stack trace from $dmp ==="
          found=0
          for cdb in "/c/Program Files (x86)/Windows Kits/10/Debuggers/x64/cdb.exe" \
                     "/c/Program Files/Microsoft Visual Studio/2022/Enterprise/Common7/IDE/Extensions/Microsoft/WindowsDbg/cdb.exe" \
                     "/c/Program Files/Microsoft Visual Studio/2022/Community/Common7/IDE/Extensions/Microsoft/WindowsDbg/cdb.exe"; do
            if [ -f "$cdb" ]; then
              "$cdb" -z "$dmp" -c "k;q" 2>/dev/null || true
              found=1
              break
            fi
          done
          [ $found -eq 0 ] && echo "(cdb not found - download artifact for offline analysis)"
        done
    - if: failure() && matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-crash-dump
        path: dumps/
